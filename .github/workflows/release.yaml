name: release
on:
  push:
    branches:
      - master
      - fix/*

permissions:
  id-token: write # Required for npm trusted publishing (OIDC)
  contents: read

jobs:
  upload-core:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    name: upload core
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24.1.0'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - name: remove authToken from .npmrc
        run: |
          NPM_RC=$(npm config get userconfig)
          sed -i '/_authToken/d' "$NPM_RC" 2>/dev/null || true
      - name: publish core
        run: |
          cd packages/core
          pnpm install
          pnpm build
          VERSION=$(node -p "require('./package.json').version")
          TAG=$( [[ "$VERSION" == *-* ]] && echo "--tag next" || echo "" )
          npm publish --access public --provenance $TAG || true
      - name: wait for core on npm
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          for i in $(seq 1 30); do
            if npm view "@gridsheet/core@$VERSION" version 2>/dev/null; then
              echo "core@$VERSION is available"
              break
            fi
            echo "Waiting for core@$VERSION... ($i/30)"
            sleep 5
          done

  upload-react-core:
    needs: upload-functions
    runs-on: ubuntu-latest
    name: upload react-core
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24.1.0'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - name: remove authToken from .npmrc
        run: |
          NPM_RC=$(npm config get userconfig)
          sed -i '/_authToken/d' "$NPM_RC" 2>/dev/null || true
      - name: publish react-core
        run: |
          cd packages/react-core
          pnpm install
          pnpm build
          VERSION=$(node -p "require('./package.json').version")
          TAG=$( [[ "$VERSION" == *-* ]] && echo "--tag next" || echo "" )
          npm publish --access public --provenance $TAG || true

  upload-preact-core:
    needs: upload-functions
    runs-on: ubuntu-latest
    name: upload preact-core
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24.1.0'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - name: remove authToken from .npmrc
        run: |
          NPM_RC=$(npm config get userconfig)
          sed -i '/_authToken/d' "$NPM_RC" 2>/dev/null || true
      - name: publish preact-core
        run: |
          cd packages/preact-core
          pnpm install
          pnpm build
          VERSION=$(node -p "require('./package.json').version")
          TAG=$( [[ "$VERSION" == *-* ]] && echo "--tag next" || echo "" )
          npm publish --access public --provenance $TAG || true

  upload-functions:
    needs: upload-core
    runs-on: ubuntu-latest
    name: upload functions
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24.1.0'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - name: remove authToken from .npmrc
        run: |
          NPM_RC=$(npm config get userconfig)
          sed -i '/_authToken/d' "$NPM_RC" 2>/dev/null || true
      - name: publish functions
        run: |
          cd packages/functions
          pnpm install
          pnpm build
          VERSION=$(node -p "require('./package.json').version")
          TAG=$( [[ "$VERSION" == *-* ]] && echo "--tag next" || echo "" )
          npm publish --access public --provenance $TAG || true

  upload-react-dev:
    needs: upload-core
    runs-on: ubuntu-latest
    name: upload react-dev
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24.1.0'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - name: remove authToken from .npmrc
        run: |
          NPM_RC=$(npm config get userconfig)
          sed -i '/_authToken/d' "$NPM_RC" 2>/dev/null || true
      - name: publish react-dev
        run: |
          cd packages/react-dev
          pnpm install
          pnpm build
          VERSION=$(node -p "require('./package.json').version")
          TAG=$( [[ "$VERSION" == *-* ]] && echo "--tag next" || echo "" )
          npm publish --access public --provenance $TAG || true

  upload-vue-core:
    needs: upload-preact-core
    runs-on: ubuntu-latest
    name: upload vue-core
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24.1.0'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - name: remove authToken from .npmrc
        run: |
          NPM_RC=$(npm config get userconfig)
          sed -i '/_authToken/d' "$NPM_RC" 2>/dev/null || true
      - name: publish vue-core
        run: |
          cd packages/vue-core
          pnpm install
          pnpm build
          npm publish --access public --provenance --tag next || true
