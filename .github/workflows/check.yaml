name: typecheck
on:
  push:
  workflow_dispatch:

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5

      - name: cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: install
        run: |
          pnpm install

      - name: check
        run: |
          pnpm typecheck:all
